name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Code Analysis and Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Hadolint (Dockerfile linter)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Run Tests with 40% Coverage Threshold
        run: npx jest --coverage --coverageThreshold='{"global":{"statements":40}}'

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build-and-publish:
    name: Build and Push Docker Image
    needs: lint-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long,enable=${{ github.ref == 'refs/heads/main' }},prefix=sha-
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Target Node
    needs: build-and-publish
    # Запускаємо розгортання тільки у випадку коли створено анотований тег
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

- name: Copy files to Target Node
        run: |
          ssh -o StrictHostKeyChecking=no student@192.168.0.115 'echo "12345678" | sudo -S mkdir -p /opt/mywebapp && echo "12345678" | sudo -S chown -R student:student /opt/mywebapp'
          scp -o StrictHostKeyChecking=no -r * student@192.168.0.115:/opt/mywebapp/

      - name: Run Deployment Script
        run: |
          ssh -o StrictHostKeyChecking=no student@192.168.0.115 'cd /opt/mywebapp && chmod +x deploy-docker.sh && echo "12345678" | sudo -S ./deploy-docker.sh'

  verify:
    name: Verify Deployment
    needs: deploy
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Verification Script
        run: |
          chmod +x verify.sh
          ./verify.sh
